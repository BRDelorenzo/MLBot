<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLBot — OEM Moto → Mercado Livre</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Favicon inline */
    link[rel="icon"] { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-brand">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
        </svg>
        <span>ML</span>Bot
      </div>
      <div class="topbar-status">
        <span class="status-dot disconnected" id="global-status-dot"></span>
        <span id="global-status-text">ML Desconectado</span>
      </div>
    </header>

    <!-- Sidebar -->
    <nav class="sidebar">
      <button class="nav-item active" data-view="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-view="import">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Importar
      </button>
      <button class="nav-item" data-view="products">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Produtos
      </button>
      <button class="nav-item" data-view="auth">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Mercado Livre
      </button>
    </nav>

    <!-- Main Content -->
    <main class="main" id="main-content">
      <div class="view">
        <div class="spinner"></div>
      </div>
    </main>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toasts"></div>

  <script src="/static/app.js"></script>
</body>
</html>
